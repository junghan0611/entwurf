name: ci

on:
  push:
  pull_request:

env:
  # Run all JS-based actions on Node 24 ahead of GitHub's 2026-06-02 default
  # switch (silences the "Node.js 20 actions are deprecated" annotation while
  # actions/checkout, setup-node, pnpm/action-setup are still on @v4).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  # The install surface has its own job because `pnpm check` is a SOURCE-tree floor: it
  # can only ever prove a dev clone works. Every fence bug this repo has shipped —
  # start.sh (0.12.1), the store-doctor (0.12.4), the plugin hook (0.12.5), the agy
  # imprint plus three operator commands (0.12.7) — was green on that floor and dead once
  # installed, because Node refuses type-stripping below node_modules. check-pack-install
  # packs the real tarball, installs it, and drives the bins and commands from under
  # node_modules. It was release-gate-only until 0.12.7, which is precisely why the class
  # kept coming back. ~1 minute.
  install-surface:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: ./run.sh check-pack-install

  # The artifact CONSUMER lane (#51 C). install-surface above is still a
  # maintainer-shaped proof: the checkout is present, every tree is runner-owned,
  # and the package is installed project-locally. This job hands one candidate
  # tarball, read-only, to a container that has never seen the repo — non-root
  # `npm install -g`, a frozen package directory, and the strict doctor oracle.
  # ENTWURF_REQUIRE_DOCKER=1 is the point of the job: locally a missing Docker is
  # an honest SKIP, but here an unprovable consumer lane must be RED, never a
  # silent pass. ~2 minutes.
  artifact-consumer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: ENTWURF_REQUIRE_DOCKER=1 ./run.sh check-install-container
